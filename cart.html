<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>MY THINGS - Cart</title>
</head>
<body>

  <header id="main-header">
    <div class="logo">MY THINGS</div>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="product.html">Shop</a>
      <a href="cart.html" id="cart-link">Cart (<span id="cart-count">2</span>)</a>
    </nav>
  </header>

  <main>
    <div class="cart-item" data-id="101">
      <img class="cart-image" src="placeholder1.jpg" alt="Product 1">
      <div class="cart-info">
        <h4 class="cart-title">Minimalistisch Horloge</h4>
        <p class="cart-price">€ 89,95</p>
        <input class="cart-qty" type="number" min="1" value="1">
      </div>
      <button class="remove-item">Remove</button>
    </div>

    <div class="cart-item" data-id="102">
      <img class="cart-image" src="placeholder2.jpg" alt="Product 2">
      <div class="cart-info">
        <h4 class="cart-title">Leren Rugzak</h4>
        <p class="cart-price">€ 120,00</p>
        <input class="cart-qty" type="number" min="1" value="1">
      </div>
      <button class="remove-item">Remove</button>
    </div>
  </main>

</body>
</html>
